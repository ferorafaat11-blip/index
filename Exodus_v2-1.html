<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة عجلة الحظ التفاعلية</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #e94560;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .logo-container {
            margin-bottom: 5px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .logo-placeholder {
            font-size: 80px;
        }

        h1 {
            color: #00fff0;
            text-shadow: 0 0 10px rgba(0,255,240,0.5);
            margin-bottom: 5px;
            margin-top: 5px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 15px;
            color: #ccc;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stats-bar span {
            background: rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 4px 14px;
        }

        .stats-bar .highlight {
            color: #00fff0;
            font-weight: bold;
        }

        .teams-container {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .team-score {
            background: rgba(255,255,255,0.07);
            border: 2px solid #00fff0;
            border-radius: 8px;
            padding: 8px 16px;
            text-align: center;
            min-width: 120px;
        }

        .team-name {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .team-score-value {
            font-size: 24px;
            font-weight: bold;
            color: #00fff0;
            margin-top: 4px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        /* تصميم العجلة والمؤشر */
        .wheel-container {
            position: relative;
            margin: 20px auto;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #fff;
            z-index: 10;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
        }

        canvas {
            display: block;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.6), 0 0 40px rgba(0,255,240,0.2);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
            background: #1a1a2e;
            width: 300px;
            height: 300px;
        }

        button {
            background: linear-gradient(45deg, #00fff0, #0081ff);
            border: none;
            color: #1a1a2e;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,240,0.4);
            transition: 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(0,255,240,0.6);
        }

        button:disabled {
            background: #555;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* النوافذ المنبثقة للأسئلة */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 20;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,255,240,0.3);
            border: 2px solid #00fff0;
            animation: fadeIn 0.5s ease;
        }

        .category-title {
            font-size: 18px;
            color: #ff007f;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .category-title.halo {
            color: #ffd700;
        }

        .question-text {
            font-size: 22px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        /* تايمر */
        .timer-container {
            margin-bottom: 15px;
        }

        .timer-bar-bg {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
        }

        .timer-bar {
            height: 12px;
            border-radius: 10px;
            background: linear-gradient(90deg, #21bf73, #00fff0);
            transition: width 1s linear, background 1s linear;
        }

        .timer-text {
            font-size: 16px;
            color: #00fff0;
            margin-top: 4px;
            font-weight: bold;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            text-align: right;
            transition: 0.3s;
        }

        .option-btn:hover {
            background-color: rgba(0,255,240,0.1);
            border-color: #00fff0;
        }

        /* حالات الإجابة */
        .option-btn.correct {
            background-color: #21bf73 !important;
            border-color: #21bf73 !important;
            color: white;
        }

        .option-btn.wrong {
            background-color: #ff4b5c !important;
            border-color: #ff4b5c !important;
            color: white;
        }

        .feedback-text {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            min-height: 25px;
        }

        .cat-remaining {
            font-size: 13px;
            color: #aaa;
            margin-top: 8px;
        }

        .team-selector {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .team-selector-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .team-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .team-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .team-btn:hover {
            background-color: rgba(0,255,240,0.1);
            border-color: #00fff0;
        }

        .team-btn.selected {
            background-color: #00fff0 !important;
            color: #1a1a2e;
            border-color: #00fff0;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* رسالة القسم فاضي */
        .empty-category-msg {
            font-size: 20px;
            color: #ff9f1c;
            margin: 20px 0;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .wheel-container {
                width: 250px;
                height: 250px;
            }

            canvas {
                width: 250px;
                height: 250px;
            }

            .stats-bar {
                font-size: 12px;
                gap: 10px;
            }

            .team-score {
                min-width: 90px;
                padding: 6px 12px;
            }

            .team-score-value {
                font-size: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .teams-container {
                gap: 10px;
            }

            button {
                padding: 12px 30px;
                font-size: 18px;
            }

            .option-btn {
                font-size: 16px;
                padding: 10px;
            }

            .question-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img id="logoImg" src="" alt="Logo" onerror="document.getElementById('logoImg').style.display='none'; document.querySelector('.logo-placeholder').style.display='block';" />
        <div class="logo-placeholder" style="display:none;">🎡</div>
    </div>
    <h1>🎮 مسابقة عجلة الحظ 🎮</h1>

    <div class="stats-bar">
        <span>إجمالي الأسئلة المتبقية: <span class="highlight" id="totalRemaining">-</span></span>
        <span>أسئلة القسم المختار: <span class="highlight" id="catRemaining">-</span></span>
    </div>

    <div class="teams-container">
        <div class="team-score">
            <div class="team-name">Hachi</div>
            <div class="team-score-value" id="scoreHachi">0</div>
        </div>
        <div class="team-score">
            <div class="team-name">خد منديل</div>
            <div class="team-score-value" id="scoreKhodMandil">0</div>
        </div>
        <div class="team-score">
            <div class="team-name">الحريفة</div>
            <div class="team-score-value" id="scoreAlhareefa">0</div>
        </div>
        <div class="team-score">
            <div class="team-name">متسألنيش عامتا</div>
            <div class="team-score-value" id="scoreMatsalnesh">0</div>
        </div>
    </div>

    <div class="container">
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel"></canvas>
        </div>
        <button id="spinBtn" onclick="spinWheel()">لف العجلة! 🎡</button>
    </div>

    <!-- نافذة الأسئلة المتغيرة -->
    <div id="quizModal" class="modal">
        <div class="modal-content">
            <div id="modalCategory" class="category-title"></div>
            <div id="modalQuestion" class="question-text"></div>
            <div class="timer-container" id="timerContainer" style="display:none;">
                <div class="timer-bar-bg">
                    <div class="timer-bar" id="timerBar"></div>
                </div>
                <div class="timer-text" id="timerText">20</div>
            </div>
            <div id="modalOptions" class="options-container"></div>
            <div id="modalFeedback" class="feedback-text"></div>
            <div class="cat-remaining" id="catRemainingModal"></div>
            
            <div class="team-selector" id="teamSelector" style="display:none;">
                <div class="team-selector-label">اختر الفريق اللي أجاب صح:</div>
                <div class="team-buttons">
                    <button class="team-btn" onclick="selectTeam('Hachi')">Hachi</button>
                    <button class="team-btn" onclick="selectTeam('خد منديل')">خد منديل</button>
                    <button class="team-btn" onclick="selectTeam('الحريفة')">الحريفة</button>
                    <button class="team-btn" onclick="selectTeam('متسألنيش عامتا')">متسألنيش عامتا</button>
                </div>
            </div>

            <button id="nextBtn" style="display:none; margin: 20px auto 0;" onclick="closeModal()">العودة للعجلة 🔄</button>
        </div>
    </div>

    <script>
        // ===== إعداد اللوجو =====
        const LOGO_BASE64 = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==";
        try {
            const img = document.getElementById('logoImg');
            img.src = 'data:image/png;base64,' + LOGO_BASE64;
        } catch(e) {
            console.log('Logo loading failed');
        }

        // الأقسام والألوان (مع الينور)
        const categories = ["رياضي", "know yourself", "جغرافيا", "معلومات تاريخية", "ضربة حظ", "الينور"];
        const colors = ["#ff007f", "#711c91", "#0abf53", "#ff9f1c", "#00fff0", "#ffd700"];

        // نظام النقاط
        const teams = ["Hachi", "خد منديل", "الحريفة", "متسألنيش عامتا"];
        let teamScores = {
            "Hachi": 0,
            "خد منديل": 0,
            "الحريفة": 0,
            "متسألنيش عامتا": 0
        };
        let currentTeam = null;

        // بنك الأسئلة
        const quizBank = {
            "know yourself": [
                { q: "المشاعر هي:", options: ["أفكار منطقية عن الموقف", "استجابات جسدية ونفسية نمر بها تجاه موقف أو شخص", "قرارات"], answer: "استجابات جسدية ونفسية نمر بها تجاه موقف أو شخص" },
                { q: "الفرق الأساسي بين 'الفكرة' و 'الشعور' إن:", options: ["الاثنين نفس الشيء", "الفكرة في الرأس، والشعور في الجسم", "الشعور دايماً صح"], answer: "الفكرة في الرأس، والشعور في الجسم" },
                { q: "من المشاعر الأساسية الـ 6 حسب علم النفس:", options: ["الملل - الفضول - الندم", "الفرح - الحزن - الغضب - الخوف - المفاجأة - الاشمئزاز", "الحب - الكره - الخوف"], answer: "الفرح - الحزن - الغضب - الخوف - المفاجأة - الاشمئزاز" },
                { q: "أي من التالي يعتبر شعور إيجابي؟", options: ["القلق", "الامتنان", "الإحباط", "الرفض"], answer: "الامتنان" },
                { q: "المشاعر بتأثر على سلوكنا إزاي؟", options: ["مش بتأثر خالص", "بتخلينا نتصرف بدون ما نفكر في النتائج", "بتؤثر على القرارات والتصرفات"], answer: "بتؤثر على القرارات والتصرفات" }
            ],
            "رياضي": [
                { q: "ما هو المنتخب الأكثر تتويجاً ببطولة كأس العالم؟", options: ["البرازيل", "ألمانيا", "الأرجنتين", "إيطاليا"], answer: "البرازيل" },
                { q: "من هو اللاعب الأكثر تسجيلاً للأهداف في تاريخ كأس العالم؟", options: ["ميروسلاف كلوزه", "رونالدو البرازيلي", "بيليه", "مارادونا"], answer: "ميروسلاف كلوزه" },
                { q: "كم عدد المنتخبات المشاركة في كأس العالم بداية من عام 2026؟", options: ["32 منتخب", "48 منتخب", "40 منتخب", "64 منتخب"], answer: "48 منتخب" },
                { q: "ما هو النادي الأكثر فوزاً ببطولة دوري أبطال أوروبا؟", options: ["ريال مدريد", "ميلان", "ليفربول", "برشلونة"], answer: "ريال مدريد" },
                { q: "من هو الهداف التاريخي لبطولة دوري أبطال أوروبا؟", options: ["كريستيانو رونالدو", "ليونيل ميسي", "كريم بنزيما", "بافيتيمبي غوميس"], answer: "كريستيانو رونالدو" }
            ],
            "جغرافيا": [
                { q: "ما هي أكبر دولة في العالم من حيث المساحة؟", options: ["روسيا", "كندا", "الصين", "أمريكا"], answer: "روسيا" },
                { q: "ما هو المحيط الأكبر في العالم؟", options: ["المحيط الهادئ", "المحيط الأطلسي", "المحيط الهندي", "المحيط المتجمد"], answer: "المحيط الهادئ" },
                { q: "أي دولة يمر بها خط الاستواء وتضم أعلى قمة جبلية فيها؟", options: ["الإكوادور", "البرازيل", "كينيا", "إندونيسيا"], answer: "الإكوادور" },
                { q: "كم عدد قارات العالم؟", options: ["5 قارات", "6 قارات", "7 قارات", "8 قارات"], answer: "7 قارات" },
                { q: "ما هو أكبر محيط في العالم؟", options: ["المتوسط", "الهادئ", "الأطلسي", "الهندي"], answer: "الهادئ" }
            ],
            "معلومات تاريخية": [
                { q: "ما هو الحدث الذي يُعد الشرارة الأولى لاندلاع الحرب العالمية الأولى؟", options: ["سقوط القسطنطينية", "اغتيال الأرشيدوق فرانز فرديناند", "الثورة الفرنسية", "الثورة الروسية"], answer: "اغتيال الأرشيدوق فرانز فرديناند" },
                { q: "في أي عام سقط جدار برلين؟", options: ["1985", "1989", "1991", "1995"], answer: "1989" },
                { q: "ما اسم الثورة التي أطاحت بحكم القياصرة في روسيا عام 1917؟", options: ["الثورة الفرنسية", "الثورة البلشفية", "الثورة الصناعية", "ثورة الورد"], answer: "الثورة البلشفية" },
                { q: "من كان أول رئيس للولايات المتحدة الأمريكية؟", options: ["جورج واشنطن", "أبراهام لينكون", "توماس جيفرسون", "بنجامين فرانكلين"], answer: "جورج واشنطن" },
                { q: "ما هي المعركة التي انتهت بهزيمة نابليون بونابرت نهائياً عام 1815؟", options: ["معركة واترلو", "معركة ماراثون", "معركة أوسترليتز", "معركة بلينا"], answer: "معركة واترلو" }
            ],
            "ضربة حظ": [
                { q: "سمّع مزمور: اللهم تراءف عليَّ يا الله كعظيم رحمتك. 🙏" },
                { q: "قل أسماء 5 شخصيات كتابية في 10 ثوانٍ. ⏱️" },
                { q: "اعمل تمثال لمدة 15 ثانية. 🗿" },
                { q: "اتكلم كأنك مذيع نشرة أخبار لمدة دقيقة. 🎙️" },
                { q: "قول آية تحفظها من غير ما تتردد. 📖" },
                { q: "امشِ كأنك روبوت حتى نهاية الجولة. 🤖" },
                { q: "اعمل صوت ديك 3 مرات. 🐓" },
                { q: "قل أسماء 5 أسفار من الكتاب المقدس بسرعة. 📚" },
                { q: "اتكلم بالفصحى للسؤال القادم. 📜" },
                { q: "قلد شخصية كتابية والباقي يخمنها. 🎭" },
                { q: "ردد وراء المجموعة: 'أنا عبقري بس الحظ مش معايا' 3 مرات. 😂" },
                { q: "قول 3 ترانيم تبدأ بحرف معين. 🎶" }
            ],
            "الينور": [
                { q: "كلم الرب موسى قائلا كلم كل جماعه بني إسرائيل وقل لهم تكونون .....لاني ....الرب الهكم" },
                { q: "من أهم ما يشير للثالوث في العهد القديم" },
                { q: "روح الرب علي الرب مسحني" },
                { q: "قديسين ..... قدوس" }
            ]
        };

        // ===== رسم العجلة =====
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        let activeCategories = [...categories];
        let activeColors = [...colors];
        let currentRotation = 0;
        let timerInterval = null;

        function getTotalRemaining() {
            return activeCategories.reduce((sum, cat) => sum + (quizBank[cat] ? quizBank[cat].length : 0), 0);
        }

        function updateStatsBar(selectedCat) {
            document.getElementById('totalRemaining').textContent = getTotalRemaining();
            if (selectedCat) {
                const rem = quizBank[selectedCat] ? quizBank[selectedCat].length : 0;
                document.getElementById('catRemaining').textContent = rem;
            } else {
                document.getElementById('catRemaining').textContent = '-';
            }
        }

        function updateTeamScores() {
            document.getElementById('scoreHachi').textContent = teamScores["Hachi"];
            document.getElementById('scoreKhodMandil').textContent = teamScores["خد منديل"];
            document.getElementById('scoreAlhareefa').textContent = teamScores["الحريفة"];
            document.getElementById('scoreMatsalnesh').textContent = teamScores["متسألنيش عامتا"];
        }

        function drawWheel() {
            // Set canvas resolution to match display size
            const size = canvas.width;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 5;
            
            ctx.clearRect(0, 0, size, size);
            
            const numSegments = activeCategories.length;
            if (numSegments === 0) {
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 22px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText('انتهت الأسئلة!', centerX, centerY + 5);
                return;
            }
            
            const segmentAngle = (2 * Math.PI) / numSegments;
            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.fillStyle = activeColors[i];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * segmentAngle, (i + 1) * segmentAngle);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * segmentAngle + segmentAngle / 2);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 14px Segoe UI";
                ctx.textAlign = "right";
                ctx.fillText(activeCategories[i], radius - 20, 5);
                ctx.restore();
            }
        }
        
        // تأكد من تحميل الصفحة قبل الرسم
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                drawWheel();
                updateStatsBar(null);
                updateTeamScores();
            });
        } else {
            drawWheel();
            updateStatsBar(null);
            updateTeamScores();
        }

        // ===== صوت العجلة =====
        function playSpinSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const duration = 4.0;
                const startTime = audioCtx.currentTime;
                for (let i = 0; i < 30; i++) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    const t = i / 30;
                    const clickTime = startTime + (t < 0.5
                        ? t * t * 2 * duration * 0.4
                        : (1 - Math.pow(1 - t, 2)) * duration);
                    osc.frequency.value = 600 + Math.random() * 200;
                    osc.type = "triangle";
                    gain.gain.setValueAtTime(0.18, clickTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, clickTime + 0.07);
                    osc.start(clickTime);
                    osc.stop(clickTime + 0.08);
                }
            } catch(e) {}
        }

        // ===== صوت الإجابة =====
        function playTone(freq, dur) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = freq;
                oscillator.type = "sine";
                oscillator.start();
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
                oscillator.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        // ===== لف العجلة =====
        function spinWheel() {
            if (activeCategories.length === 0) return;
            const btn = document.getElementById("spinBtn");
            btn.disabled = true;

            playSpinSound();

            const numSegments = activeCategories.length;
            const segmentAngle = (2 * Math.PI) / numSegments;
            const extraSpins = 5 + Math.floor(Math.random() * 5);
            const randomAngle = Math.random() * 2 * Math.PI;
            const totalTargetRotation = currentRotation + (extraSpins * 2 * Math.PI) + randomAngle;

            canvas.style.transition = 'transform 4s cubic-bezier(0.1, 0.8, 0.1, 1)';
            canvas.style.transform = `rotate(${totalTargetRotation}rad)`;
            currentRotation = totalTargetRotation;

            setTimeout(() => {
                const normalizedRotation = (totalTargetRotation % (2 * Math.PI));
                let wheelAngle = (Math.PI / 2 - normalizedRotation) % (2 * Math.PI);
                if (wheelAngle < 0) wheelAngle += (2 * Math.PI);
                const winningIndex = Math.floor(wheelAngle / segmentAngle) % numSegments;

                openQuiz(activeCategories[winningIndex]);
                btn.disabled = false;
            }, 4000);
        }

        // ===== فتح السؤال =====
        let currentCategory = null;
        let currentQuestionIndex = null;

        function openQuiz(category) {
            currentCategory = category;
            currentTeam = null;
            const modal = document.getElementById("quizModal");
            const catTitle = document.getElementById("modalCategory");
            const qText = document.getElementById("modalQuestion");
            const optionsBox = document.getElementById("modalOptions");
            const feedback = document.getElementById("modalFeedback");
            const nextBtn = document.getElementById("nextBtn");
            const catRemainingModal = document.getElementById("catRemainingModal");
            const timerContainer = document.getElementById("timerContainer");
            const teamSelector = document.getElementById("teamSelector");

            catTitle.innerText = `القسم المختار: ${category}`;
            if (category === "الينور") {
                catTitle.classList.add("halo");
            } else {
                catTitle.classList.remove("halo");
            }
            feedback.innerText = "";
            optionsBox.innerHTML = "";
            nextBtn.style.display = "none";
            timerContainer.style.display = "none";
            teamSelector.style.display = "none";
            catRemainingModal.innerText = "";

            updateStatsBar(category);

            const questions = quizBank[category];
            if (!questions || questions.length === 0) {
                qText.innerHTML = `<span class="empty-category-msg">خلصت أسئلة قسم "${category}"! 🎉<br>سيُزال من العجلة.</span>`;
                nextBtn.style.display = "block";
                nextBtn.onclick = function() {
                    removeCategory(category);
                    closeModal();
                };
                modal.style.display = "flex";
                return;
            }

            nextBtn.onclick = closeModal;

            const randomIndex = Math.floor(Math.random() * questions.length);
            currentQuestionIndex = randomIndex;
            const questionObj = questions[randomIndex];

            const remaining = questions.length;
            catRemainingModal.innerText = `أسئلة متبقية في القسم: ${remaining}`;

            qText.innerText = questionObj.q;

            if (category === "ضربة حظ" || category === "الينور") {
                feedback.innerText = "نفذ التحدي المطلوب واضغط اختار الفريق!";
                feedback.style.color = "#00fff0";
                teamSelector.style.display = "block";
                quizBank[category].splice(randomIndex, 1);
            } else {
                timerContainer.style.display = "block";
                startTimer(20, function() {
                    const allBtns = document.querySelectorAll(".option-btn");
                    allBtns.forEach(btn => btn.disabled = true);
                    feedback.innerText = "انتهى الوقت! ⏰";
                    feedback.style.color = "#ff9f1c";
                    allBtns.forEach(btn => {
                        if (btn.innerText === questionObj.answer) btn.classList.add("correct");
                    });
                    quizBank[category].splice(randomIndex, 1);
                    nextBtn.style.display = "block";
                    updateStatsBar(category);
                });

                if (questionObj.options) {
                    questionObj.options.forEach(opt => {
                        const button = document.createElement("button");
                        button.classList.add("option-btn");
                        button.innerText = opt;
                        button.onclick = () => checkAnswer(button, opt, questionObj.answer, questionObj.feedback, category, randomIndex);
                        optionsBox.appendChild(button);
                    });
                }
            }

            modal.style.display = "flex";
        }

        // ===== اختيار الفريق =====
        function selectTeam(teamName) {
            currentTeam = teamName;
            const teamBtns = document.querySelectorAll(".team-btn");
            teamBtns.forEach(btn => btn.classList.remove("selected"));
            event.target.classList.add("selected");
            
            teamScores[teamName]++;
            updateTeamScores();
            
            if (currentCategory && currentQuestionIndex !== null) {
                quizBank[currentCategory].splice(currentQuestionIndex, 1);
                updateStatsBar(currentCategory);
            }
            
            document.getElementById("nextBtn").style.display = "block";
        }

        // ===== التايمر =====
        function startTimer(seconds, onTimeout) {
            clearInterval(timerInterval);
            const bar = document.getElementById("timerBar");
            const timerText = document.getElementById("timerText");
            let remaining = seconds;
            bar.style.width = "100%";
            bar.style.background = "linear-gradient(90deg, #21bf73, #00fff0)";
            timerText.textContent = remaining;

            timerInterval = setInterval(() => {
                remaining--;
                timerText.textContent = remaining;
                const pct = (remaining / seconds) * 100;
                bar.style.width = pct + "%";

                if (remaining <= 7) {
                    bar.style.background = "linear-gradient(90deg, #ff4b5c, #ff9f1c)";
                } else if (remaining <= 13) {
                    bar.style.background = "linear-gradient(90deg, #ff9f1c, #ffff00)";
                }

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    onTimeout();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        // ===== التحقق من الإجابة =====
        function checkAnswer(selectedBtn, selectedOption, correctOption, feedbackMsg, category, questionIndex) {
            stopTimer();
            const allButtons = document.querySelectorAll(".option-btn");
            const feedback = document.getElementById("modalFeedback");
            const nextBtn = document.getElementById("nextBtn");

            allButtons.forEach(btn => btn.disabled = true);

            quizBank[category].splice(questionIndex, 1);
            updateStatsBar(category);

            if (selectedOption === correctOption) {
                selectedBtn.classList.add("correct");
                feedback.innerText = "إجابة صحيحة! برافو عيك 🥳🎉";
                feedback.style.color = "#21bf73";
                playTone(523.25, 0.4);
                
                document.getElementById("teamSelector").style.display = "block";
            } else {
                selectedBtn.classList.add("wrong");
                feedback.innerText = `إجابة خاطئة! ❌`;
                feedback.style.color = "#ff4b5c";
                playTone(150, 0.5);
                allButtons.forEach(btn => {
                    if (btn.innerText === correctOption) btn.classList.add("correct");
                });
            }

            if (feedbackMsg) {
                feedback.innerHTML += `<br><small style="color:#aaa; font-weight:normal;">💡 ${feedbackMsg}</small>`;
            }

            const rem = quizBank[category] ? quizBank[category].length : 0;
            document.getElementById("catRemainingModal").innerText = `أسئلة متبقية في القسم: ${rem}`;

            nextBtn.style.display = "block";
        }

        // ===== إغلاق المودال =====
        function closeModal() {
            stopTimer();
            document.getElementById("quizModal").style.display = "none";
            if (currentCategory && quizBank[currentCategory] && quizBank[currentCategory].length === 0) {
                removeCategory(currentCategory);
            }
            updateStatsBar(null);
        }

        // ===== إزالة القسم من العجلة =====
        function removeCategory(category) {
            const idx = activeCategories.indexOf(category);
            if (idx !== -1) {
                activeCategories.splice(idx, 1);
                activeColors.splice(idx, 1);
            }
            canvas.style.transition = 'none';
            canvas.style.transform = `rotate(${currentRotation}rad)`;
            drawWheel();
            updateStatsBar(null);
        }

    </script>
</body>
</html>
